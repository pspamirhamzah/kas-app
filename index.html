<!DOCTYPE html>
<html>

<head>

<title>Kas Iuran Kantor</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
max-width:1000px;
margin:auto;
}

.card{
border:1px solid #ddd;
padding:15px;
margin:10px;
border-radius:10px;
}

</style>

</head>

<body>

<h1>KAS IURAN KANTOR</h1>

Bulan

<select id="bulan">
<option value="1">Jan</option>
<option value="2">Feb</option>
<option value="3">Mar</option>
<option value="4">Apr</option>
<option value="5">Mei</option>
<option value="6">Jun</option>
<option value="7">Jul</option>
<option value="8">Agu</option>
<option value="9">Sep</option>
<option value="10">Okt</option>
<option value="11">Nov</option>
<option value="12">Des</option>
</select>

<select id="tahun">
<option>2025</option>
<option>2026</option>
<option>2027</option>
</select>

<button onclick="load()">Tampilkan</button>

<div class="card">

Total Anggota : <span id="anggota"></span><br>
Sudah Bayar : <span id="sudah"></span><br>
Belum Bayar : <span id="belum"></span>

</div>

<div class="card">

Total Iuran : <span id="iuran"></span><br>
Pengeluaran : <span id="pengeluaran"></span><br>

<h2>Saldo : <span id="saldo"></span></h2>

</div>

<canvas id="chart"></canvas>

<h3>Belum Bayar</h3>

<ul id="listBelum"></ul>

<h3>Transaksi</h3>

<table border="1" width="100%">

<thead>
<tr>
<th>Tanggal</th>
<th>Jenis</th>
<th>Keterangan</th>
<th>Jumlah</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

<script src="js/config.js"></script>
<script src="js/dashboard.js"></script>

</body>
</html>
